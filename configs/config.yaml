data:
  n_days: 7
  freq_minutes: 5
  metrics:
    - cpu_pct
    - mem_pct
    - disk_io
    - latency_ms
    - error_rate
  anomaly_rate: 0.05
  seed: 42

features:
  window_sizes: [12, 72, 288]
  lags: [1, 6, 24]
  include_time_features: true

model:
  autoencoder:
    sequence_length: 48
    hidden_size: 32
    num_layers: 1
    learning_rate: 1e-3
    max_epochs: 5
    early_stop_patience: 3
    batch_size: 128
  isolation_forest:
    n_estimators: 100
    contamination: 0.05
    random_state: 42
  ensemble:
    autoencoder_weight: 0.6
    isolation_weight: 0.4
    threshold_percentile: 95

api:
  host: "0.0.0.0"
  port: 8000

pipeline:
  train_test_split: 0.8
  validation_split: 0.1
